<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MR Coach Position System - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b3d91;
    font-family:Arial,Helvetica,sans-serif;
}

.login-box{

    width:420px;
    background:white;
    border-radius:12px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.25);

}

.logo{

    text-align:center;
    font-size:70px;

}

.title{

    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:#003366;
    margin-bottom:5px;

}

.subtitle{

    text-align:center;
    color:#666;
    margin-bottom:25px;

}

.btn-login{

    width:100%;
    background:#003366;
    color:white;
    font-size:18px;

}

.btn-login:hover{

    background:#0055aa;
    color:white;

}

.footer{

    text-align:center;
    margin-top:20px;
    color:#777;
    font-size:13px;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
🚆
</div>

<div class="title">
MR COACH POSITION SYSTEM
</div>

<div class="subtitle">
Liluah Railway Workshop
</div>

<form id="loginForm">

<div class="mb-3">

<label class="form-label">
Username
</label>

<input
type="text"
class="form-control"
id="username"
placeholder="Enter Username"
required>

</div>


<div class="mb-3">

<label class="form-label">
Password
</label>

<input
type="password"
class="form-control"
id="password"
placeholder="Enter Password"
required>

</div>


<div class="mb-3">

<label class="form-label">
Role
</label>

<select class="form-select" id="role">

<option>Admin</option>
<option>SSE</option>
<option>Supervisor</option>
<option>Viewer</option>

</select>

</div>


<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
id="remember">

<label class="form-check-label">
Remember Me
</label>

</div>


<button
type="submit"
class="btn btn-login">

LOGIN

</button>

</form>


<div class="footer">

© 2026 MR Coach Position System

</div>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();

let username=
document.getElementById("username").value;

let password=
document.getElementById("password").value;

if(username==="admin" && password==="1234"){

alert("Login Successful");

// Redirect
window.location.href="dashboard.html";

}

else{

alert("Invalid Username or Password");

}

});

</script>

</body>

</html>
